<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NOW PLAYING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --accent: #00ff88;
    --accent-dim: #00ff8844;
    --secondary: #00eeff;
    --warning: #ffaa00;
    --error: #ff2244;
    --bg: #020a06;
    --text-primary: #ffffff;
    --panel: rgba(0, 255, 136, 0.04);
    --border: rgba(0, 255, 136, 0.15);
    --overlay: rgba(0, 0, 0, 0.6);
    --scanline: rgba(0, 0, 0, 0.12);
    --vignette: rgba(0, 0, 0, 0.85);
    --glow-color: rgba(0, 255, 136, 0.3);
    --pill-bg: rgba(0, 255, 136, 0.08);
    --pill-glow: rgba(0, 255, 136, 0.15);
    --progress-bg: rgba(0, 255, 136, 0.1);
    --art-filter: saturate(0.7) brightness(0.9);
    --bg-blur: blur(60px) brightness(0.18) saturate(1.8);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: none;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, var(--vignette) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* Album art blurred bg */
  #art-bg {
    position: fixed;
    inset: -40px;
    background-size: cover;
    background-position: center;
    filter: var(--bg-blur);
    transition: background-image 1.2s ease;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 40px 60px;
    gap: 0;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 0;
  }

  #topbar .logo {
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--accent);
    opacity: 0.7;
  }

  #topbar .sys-info {
    font-size: 12px;
    opacity: 0.45;
    letter-spacing: 2px;
    display: flex;
    gap: 32px;
  }

  #clock {
    color: var(--secondary);
    opacity: 0.7;
  }

  /* MAIN CONTENT */
  #main {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 60px;
    align-items: center;
    padding: 40px 0;
  }

  /* Album Art */
  #art-wrapper {
    position: relative;
    width: 340px;
    height: 340px;
    flex-shrink: 0;
  }

  #art-wrapper::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 1px solid var(--border);
    z-index: 2;
  }

  /* Corner brackets */
  #art-wrapper::after {
    content: '';
    position: absolute;
    inset: -8px;
    border: 1px solid transparent;
    border-image: none;
    background:
      linear-gradient(var(--accent), var(--accent)) top left / 20px 1px no-repeat,
      linear-gradient(var(--accent), var(--accent)) top left / 1px 20px no-repeat,
      linear-gradient(var(--accent), var(--accent)) top right / 20px 1px no-repeat,
      linear-gradient(var(--accent), var(--accent)) top right / 1px 20px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom left / 20px 1px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom left / 1px 20px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom right / 20px 1px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom right / 1px 20px no-repeat;
    z-index: 3;
    opacity: 0.6;
  }

  #album-art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: var(--art-filter);
    transition: opacity 0.8s ease;
  }

  #art-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--overlay);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0.5;
    padding: 6px 10px;
    text-align: center;
    z-index: 4;
  }

  /* Track info */
  #track-info {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .info-block {
    border-left: 1px solid var(--border);
    padding-left: 20px;
  }

  .info-label {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.4;
    margin-bottom: 6px;
    color: var(--secondary);
  }

  .info-value {
    font-size: 15px;
    letter-spacing: 1px;
    opacity: 0.9;
    line-height: 1.4;
  }

  #track-title {
    font-family: 'VT323', monospace;
    font-size: 52px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text-primary);
    text-shadow: 0 0 30px var(--glow-color);
    margin-bottom: 4px;
  }

  #track-artist {
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 3px;
    opacity: 0.85;
  }

  #track-album {
    font-size: 14px;
    opacity: 0.5;
    letter-spacing: 2px;
  }

  /* Progress bar */
  #progress-section {
    margin-top: 10px;
  }

  #progress-bar-wrap {
    position: relative;
    height: 2px;
    background: var(--progress-bg);
    margin: 10px 0 8px;
    overflow: visible;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    transition: width 1s linear;
    position: relative;
  }

  #progress-bar::after {
    content: '';
    position: absolute;
    right: -3px;
    top: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  #progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    opacity: 0.4;
    letter-spacing: 2px;
  }

  /* Status row */
  #status-row {
    display: flex;
    gap: 24px;
    margin-top: 8px;
    align-items: center;
  }

  .status-pill {
    font-size: 10px;
    letter-spacing: 3px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    color: var(--accent);
    opacity: 0.5;
  }

  .status-pill.active {
    opacity: 1;
    border-color: var(--accent);
    background: var(--pill-bg);
    box-shadow: 0 0 12px var(--pill-glow);
  }

  #state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 3px;
  }

  #state-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Waveform visualizer */
  #visualizer {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 40px;
    margin-top: 16px;
  }

  .bar {
    width: 3px;
    background: var(--accent);
    opacity: 0.6;
    border-radius: 1px;
    animation: wave 0s infinite ease-in-out alternate;
    min-height: 3px;
  }

  @keyframes wave {
    from { height: 3px; }
    to { height: var(--max-h); }
  }

  /* BOTTOM BAR */
  #bottombar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  #data-stream {
    font-size: 10px;
    opacity: 0.25;
    letter-spacing: 2px;
    overflow: hidden;
    white-space: nowrap;
    max-width: 600px;
  }

  #entity-id {
    font-size: 10px;
    opacity: 0.3;
    letter-spacing: 2px;
    text-align: right;
  }

  /* Idle state */
  #idle-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--bg);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  #idle-screen.visible {
    display: flex;
  }

  #idle-title {
    font-family: 'VT323', monospace;
    font-size: 48px;
    letter-spacing: 12px;
    opacity: 0.2;
  }

  #idle-sub {
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0.15;
  }

  .blink {
    animation: blink 1.4s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Connection error */
  #conn-error {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--error);
    opacity: 0.7;
    z-index: 200;
  }

  #conn-error.visible { display: block; }

  /* Smaller viewports (720p TVs, browsers with chrome eating space) */
  @media (max-height: 800px) {
    #app {
      padding: 20px 30px;
    }

    #topbar { padding-bottom: 10px; }
    #topbar .logo { font-size: 18px; letter-spacing: 4px; }
    #topbar .sys-info { font-size: 10px; gap: 20px; }

    #main {
      gap: 30px;
      padding: 20px 0;
    }

    #art-wrapper {
      width: 220px;
      height: 220px;
    }

    #track-title {
      font-size: 36px;
    }

    #track-artist {
      font-size: 16px;
    }

    #track-album {
      font-size: 11px;
    }

    #track-info {
      gap: 12px;
    }

    #visualizer {
      height: 24px;
      margin-top: 8px;
    }

    #bottombar { padding-top: 10px; }

    #debug-info { display: none; }
  }
</style>
</head>
<body>

<div id="art-bg"></div>

<div id="idle-screen">
  <div id="idle-title">STANDBY</div>
  <div id="idle-sub">AWAITING AUDIO STREAM<span class="blink">_</span></div>
</div>

<div id="conn-error">⚠ WS DISCONNECTED — RECONNECTING...</div>
<div id="debug-info" style="position:fixed;top:40px;left:60px;font-size:11px;opacity:0.4;letter-spacing:2px;z-index:200;"></div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">MUSIC ASSISTANT // MONITOR</div>
    <div class="sys-info">
      <span>SYS:ONLINE</span>
      <span id="clock">00:00:00</span>
      <span id="ws-status">WS:CONNECTING</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="art-wrapper">
      <img id="album-art" src="" alt="album art">
      <div id="art-label">ALBUM ART // STREAM</div>
    </div>

    <div id="track-info">
      <div>
        <div id="track-title">—</div>
        <div id="track-artist">—</div>
        <div id="track-album" style="margin-top:6px; font-size:13px; opacity:0.4; letter-spacing:2px;">—</div>
      </div>

      <div id="progress-section">
        <div class="info-label">POSITION</div>
        <div id="progress-bar-wrap">
          <div id="progress-bar" style="width:0%"></div>
        </div>
        <div id="progress-times">
          <span id="pos-current">0:00</span>
          <span id="pos-duration">0:00</span>
        </div>
      </div>

      <div id="status-row">
        <div id="state-indicator">
          <div id="state-dot"></div>
          <span id="state-text">IDLE</span>
        </div>
        <div class="status-pill" id="pill-shuffle">SHUFFLE</div>
        <div class="status-pill" id="pill-repeat">REPEAT</div>
      </div>

      <div id="visualizer"></div>

      <div class="info-block" style="margin-top:4px;">
        <div class="info-label">SOURCE</div>
        <div class="info-value" id="media-source" style="font-size:12px; opacity:0.5;">—</div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <div id="data-stream">INIT...</div>
    <div id="entity-id">PLAYER: —</div>
  </div>
</div>

<script src="config.js"></script>
<script src="themes.js"></script>
<script>
if (typeof MA_TOKEN === 'undefined') {
  document.body.innerHTML = '<pre style="color:var(--error);padding:40px;">ERROR: config.js not found or missing MA_TOKEN.\nCopy config.example.js to config.js and fill in your values.</pre>';
  throw new Error('config.js not loaded');
}

const MA_BASE = typeof MA_HOST !== 'undefined' ? MA_HOST : HA_HOST.replace(':8123', ':8095');
document.getElementById('debug-info').textContent = `TARGET: ws://${MA_BASE}/ws`;

const params = new URLSearchParams(window.location.search);
const themeName = params.get('theme') || 'crt';
const theme = THEMES[themeName] || THEMES.crt;
const root = document.documentElement;
Object.entries(theme).forEach(([prop, val]) => root.style.setProperty(prop, val));

let ws = null;
let reconnectTimer = null;
let progressInterval = null;
let currentPos = 0;
let currentDuration = 0;
let posLastUpdated = 0;
let isPlaying = false;
let activePlayerId = null;
let msgCounter = 0;

// Build visualizer bars
const viz = document.getElementById('visualizer');
const BAR_COUNT = 32;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const maxH = Math.floor(Math.random() * 34) + 6;
  b.style.setProperty('--max-h', maxH + 'px');
  b.style.animationDuration = (Math.random() * 0.5 + 0.2) + 's';
  b.style.animationDelay = (Math.random() * 0.3) + 's';
  viz.appendChild(b);
}

function setVisualizerPlaying(playing) {
  viz.querySelectorAll('.bar').forEach(b => {
    b.style.animationPlayState = playing ? 'running' : 'paused';
  });
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000);
updateClock();

// Format seconds
function fmt(s) {
  s = Math.floor(s || 0);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// Data stream ticker
const streamMsgs = [
  'MUSIC ASSISTANT CONNECTED',
  'AUDIO BUFFER: NOMINAL',
  'METADATA SYNC: OK',
  'STREAM INTEGRITY: 100%',
  'LATENCY: <12MS',
];
let streamIdx = 0;
setInterval(() => {
  document.getElementById('data-stream').textContent = streamMsgs[streamIdx % streamMsgs.length];
  streamIdx++;
}, 3000);

// Pick the best player: first playing, else first paused, else null
function pickActivePlayer(players) {
  const playing = players.find(p => p.available && p.playback_state === 'playing');
  if (playing) return playing;
  const paused = players.find(p => p.available && p.playback_state === 'paused');
  if (paused) return paused;
  return null;
}

// Track last known good display data so we can show "last played" when idle
let lastKnownMedia = null;

function updateFromPlayer(player, queue) {
  const media = player.current_media;
  const state = player.playback_state || 'idle';
  const hasQueueTrack = !!queue?.current_item?.media_item;
  const hasMedia = hasQueueTrack || (media && media.title);

  isPlaying = state === 'playing';
  activePlayerId = player.player_id;

  if (hasMedia) {
    lastKnownMedia = { media, player, queue };
    renderTrackInfo(state, media, player, queue);
  } else if (lastKnownMedia) {
    // No current media — show last known track
    renderTrackInfo(state, lastKnownMedia.media, player, lastKnownMedia.queue);
  } else {
    // Nothing ever played — show standby
    document.getElementById('idle-screen').classList.add('visible');
    setVisualizerPlaying(false);
  }
}

// Proxy album art through Music Assistant so devices that can't reach
// the media server directly (e.g. Fire TV without Tailscale) still load art.
function proxyArtUrl(url) {
  if (!url) return '';
  return `http://${MA_BASE}/imageproxy?path=${encodeURIComponent(url)}&size=500`;
}

function renderTrackInfo(state, media, player, queue) {
  // Prefer queue's current_item for rich metadata (player.current_media
  // often only has the source name, e.g. "Spotify", when using external control)
  const queueItem = queue?.current_item;
  const trackInfo = queueItem?.media_item;

  const title = trackInfo?.name || queueItem?.name || media?.title || '—';
  const artists = trackInfo?.artists;
  const artist = artists?.length ? artists.map(a => a.name).join(', ') : (media?.artist || '—');
  const album = trackInfo?.album?.name || media?.album || '—';
  const rawArtUrl = queueItem?.image?.path || media?.image_url || '';
  const artUrl = proxyArtUrl(rawArtUrl);
  const duration = queueItem?.duration || media?.duration || 0;
  const source = media?.source_id || media?.uri || '—';

  isPlaying = state === 'playing';

  // Compute elapsed time
  const elapsed = player.elapsed_time || 0;
  const lastUpdated = player.elapsed_time_last_updated || 0;
  if (isPlaying && lastUpdated > 0) {
    const now = Date.now() / 1000;
    currentPos = elapsed + (now - lastUpdated);
  } else {
    currentPos = elapsed;
  }
  currentDuration = duration;
  posLastUpdated = lastUpdated;

  document.getElementById('track-title').textContent = title;
  document.getElementById('track-artist').textContent = artist;
  document.getElementById('track-album').textContent = album;
  document.getElementById('state-text').textContent = state.toUpperCase();
  document.getElementById('entity-id').textContent = `PLAYER: ${player.name.toUpperCase()}`;
  document.getElementById('media-source').textContent = source.length > 60 ? source.slice(0, 60) + '…' : source;

  // Album art
  if (artUrl) {
    document.getElementById('album-art').src = artUrl;
    document.getElementById('art-bg').style.backgroundImage = `url('${artUrl}')`;
  }

  updateProgress();

  // Shuffle / repeat from queue
  if (queue) {
    document.getElementById('pill-shuffle').classList.toggle('active', !!queue.shuffle_enabled);
    document.getElementById('pill-repeat').classList.toggle('active', queue.repeat_mode && queue.repeat_mode !== 'off');
  }

  // Visualizer
  setVisualizerPlaying(isPlaying);

  // Never show idle screen if we have track info to display
  document.getElementById('idle-screen').classList.remove('visible');

  // State dot color
  const dot = document.getElementById('state-dot');
  dot.style.background = isPlaying ? 'var(--accent)' : 'var(--warning)';
  dot.style.boxShadow = isPlaying ? '0 0 8px var(--accent)' : '0 0 8px var(--warning)';
}

function updateProgress() {
  if (currentDuration <= 0) return;
  const pct = Math.min((currentPos / currentDuration) * 100, 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('pos-current').textContent = fmt(currentPos);
  document.getElementById('pos-duration').textContent = fmt(currentDuration);
}

function startProgressTick() {
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) {
      currentPos += 1;
      updateProgress();
    }
  }, 1000);
}

function sendCmd(command, args) {
  const id = 'msg-' + (++msgCounter);
  ws.send(JSON.stringify({ message_id: id, command, args: args || {} }));
  return id;
}

// Store pending response callbacks
const pending = {};
function sendCmdWithCallback(command, args, callback) {
  const id = 'msg-' + (++msgCounter);
  pending[id] = callback;
  ws.send(JSON.stringify({ message_id: id, command, args: args || {} }));
}

// WebSocket connection to Music Assistant
let authenticated = false;
let authMsgId = null;

function connect() {
  if (ws) ws.close();
  authenticated = false;
  authMsgId = null;
  ws = new WebSocket(`ws://${MA_BASE}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'WS:CONNECTING';
    document.getElementById('conn-error').classList.remove('visible');
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    // Server info message (no message_id) — sent immediately on connect
    if (!msg.message_id && msg.server_version) {
      document.getElementById('ws-status').textContent = 'WS:AUTH';
      authMsgId = sendCmd('auth', { token: MA_TOKEN });
      return;
    }

    // Handle responses to our commands
    if (msg.message_id) {
      // Auth response
      if (msg.message_id === authMsgId) {
        if (msg.result?.authenticated) {
          authenticated = true;
          document.getElementById('ws-status').textContent = 'WS:LIVE';
          fetchActivePlaying();
          startProgressTick();
          startPolling();
        } else {
          document.getElementById('ws-status').textContent = 'WS:AUTH_FAIL';
        }
        return;
      }
      // Pending callbacks
      if (pending[msg.message_id]) {
        pending[msg.message_id](msg.result);
        delete pending[msg.message_id];
        return;
      }
    }

    // Handle events (auto-subscribed by MA)
    if (msg.event === 'player_updated') {
      handlePlayerUpdate(msg.data);
    }
    if (msg.event === 'queue_updated') {
      handleQueueUpdate(msg.data);
    }
    if (msg.event === 'queue_time_updated') {
      handleTimeUpdate(msg.data);
    }
  };

  ws.onclose = (e) => {
    document.getElementById('ws-status').textContent = `WS:DOWN (${e.code})`;
    document.getElementById('conn-error').classList.add('visible');
    clearInterval(progressInterval);
    clearInterval(pollTimer);
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    document.getElementById('ws-status').textContent = `WS:ERR ${MA_BASE}`;
    ws.close();
  };
}

let pollTimer = null;
function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if (authenticated && ws && ws.readyState === WebSocket.OPEN) {
      fetchActivePlaying();
    }
  }, 5000);
}

function fetchActivePlaying() {
  // Fetch players and all queues in parallel
  let allPlayers = null;
  let allQueues = null;

  function resolve() {
    if (!allPlayers || !allQueues) return;

    const player = pickActivePlayer(allPlayers);

    if (player) {
      // Find matching queue for this player
      const queue = allQueues.find(q => q.queue_id === player.player_id);
      if (queue?.current_item?.media_item) {
        updateFromPlayer(player, queue);
        return;
      }
    }

    // No active player with rich queue data — find any queue with a track
    const queueWithTrack = allQueues.find(q => q.current_item?.media_item);
    if (queueWithTrack) {
      const matchPlayer = allPlayers.find(p => p.player_id === queueWithTrack.queue_id) ||
        { player_id: queueWithTrack.queue_id, name: queueWithTrack.display_name, playback_state: 'idle', current_media: null, elapsed_time: queueWithTrack.elapsed_time, elapsed_time_last_updated: 0 };
      updateFromPlayer(matchPlayer, queueWithTrack);
      return;
    }

    // Fall back to active player even without rich data
    if (player) {
      updateFromPlayer(player, null);
      return;
    }

    // Nothing at all
    document.getElementById('idle-screen').classList.add('visible');
    setVisualizerPlaying(false);
  }

  sendCmdWithCallback('players/all', {}, (players) => { allPlayers = players; resolve(); });
  sendCmdWithCallback('player_queues/all', {}, (queues) => { allQueues = queues; resolve(); });
}

function handlePlayerUpdate(player) {
  if (!player || !player.available) return;

  // If this is our active player or a new player started playing, re-scan
  if (player.player_id === activePlayerId || player.playback_state === 'playing') {
    fetchActivePlaying();
    return;
  }

  // Ignore updates from other idle players
  if (activePlayerId && player.player_id !== activePlayerId) return;
  fetchActivePlaying();
}

function handleQueueUpdate(queue) {
  if (!queue) return;
  // Re-fetch track info when queue changes (e.g. song change)
  fetchActivePlaying();
}

function handleTimeUpdate(data) {
  if (!data || !activePlayerId) return;
  // queue_time_updated gives us elapsed_time for a queue
  if (typeof data.elapsed_time === 'number') {
    currentPos = data.elapsed_time;
    updateProgress();
  }
}

connect();
</script>

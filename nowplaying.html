<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOW PLAYING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --green: #00ff88;
    --dim-green: #00ff8844;
    --cyan: #00eeff;
    --red: #ff2244;
    --bg: #020a06;
    --panel: rgba(0, 255, 136, 0.04);
    --border: rgba(0, 255, 136, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: none;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* Album art blurred bg */
  #art-bg {
    position: fixed;
    inset: -40px;
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(0.18) saturate(1.8);
    transition: background-image 1.2s ease;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 40px 60px;
    gap: 0;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 0;
  }

  #topbar .logo {
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--green);
    opacity: 0.7;
  }

  #topbar .sys-info {
    font-size: 12px;
    opacity: 0.45;
    letter-spacing: 2px;
    display: flex;
    gap: 32px;
  }

  #clock {
    color: var(--cyan);
    opacity: 0.7;
  }

  /* MAIN CONTENT */
  #main {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 60px;
    align-items: center;
    padding: 40px 0;
  }

  /* Album Art */
  #art-wrapper {
    position: relative;
    width: 340px;
    height: 340px;
    flex-shrink: 0;
  }

  #art-wrapper::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 1px solid var(--border);
    z-index: 2;
  }

  /* Corner brackets */
  #art-wrapper::after {
    content: '';
    position: absolute;
    inset: -8px;
    border: 1px solid transparent;
    border-image: none;
    background:
      linear-gradient(var(--green), var(--green)) top left / 20px 1px no-repeat,
      linear-gradient(var(--green), var(--green)) top left / 1px 20px no-repeat,
      linear-gradient(var(--green), var(--green)) top right / 20px 1px no-repeat,
      linear-gradient(var(--green), var(--green)) top right / 1px 20px no-repeat,
      linear-gradient(var(--green), var(--green)) bottom left / 20px 1px no-repeat,
      linear-gradient(var(--green), var(--green)) bottom left / 1px 20px no-repeat,
      linear-gradient(var(--green), var(--green)) bottom right / 20px 1px no-repeat,
      linear-gradient(var(--green), var(--green)) bottom right / 1px 20px no-repeat;
    z-index: 3;
    opacity: 0.6;
  }

  #album-art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.7) brightness(0.9);
    transition: opacity 0.8s ease;
  }

  #art-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.6);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--green);
    opacity: 0.5;
    padding: 6px 10px;
    text-align: center;
    z-index: 4;
  }

  /* Track info */
  #track-info {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .info-block {
    border-left: 1px solid var(--border);
    padding-left: 20px;
  }

  .info-label {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.4;
    margin-bottom: 6px;
    color: var(--cyan);
  }

  .info-value {
    font-size: 15px;
    letter-spacing: 1px;
    opacity: 0.9;
    line-height: 1.4;
  }

  #track-title {
    font-family: 'VT323', monospace;
    font-size: 52px;
    letter-spacing: 2px;
    line-height: 1;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(0,255,136,0.3);
    margin-bottom: 4px;
  }

  #track-artist {
    font-size: 22px;
    color: var(--green);
    letter-spacing: 3px;
    opacity: 0.85;
  }

  #track-album {
    font-size: 14px;
    opacity: 0.5;
    letter-spacing: 2px;
  }

  /* Progress bar */
  #progress-section {
    margin-top: 10px;
  }

  #progress-bar-wrap {
    position: relative;
    height: 2px;
    background: rgba(0,255,136,0.1);
    margin: 10px 0 8px;
    overflow: visible;
  }

  #progress-bar {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: width 1s linear;
    position: relative;
  }

  #progress-bar::after {
    content: '';
    position: absolute;
    right: -3px;
    top: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
  }

  #progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    opacity: 0.4;
    letter-spacing: 2px;
  }

  /* Status row */
  #status-row {
    display: flex;
    gap: 24px;
    margin-top: 8px;
    align-items: center;
  }

  .status-pill {
    font-size: 10px;
    letter-spacing: 3px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    color: var(--green);
    opacity: 0.5;
  }

  .status-pill.active {
    opacity: 1;
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    box-shadow: 0 0 12px rgba(0,255,136,0.15);
  }

  #state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 3px;
  }

  #state-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Waveform visualizer */
  #visualizer {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 40px;
    margin-top: 16px;
  }

  .bar {
    width: 3px;
    background: var(--green);
    opacity: 0.6;
    border-radius: 1px;
    animation: wave 0s infinite ease-in-out alternate;
    min-height: 3px;
  }

  @keyframes wave {
    from { height: 3px; }
    to { height: var(--max-h); }
  }

  /* BOTTOM BAR */
  #bottombar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  #data-stream {
    font-size: 10px;
    opacity: 0.25;
    letter-spacing: 2px;
    overflow: hidden;
    white-space: nowrap;
    max-width: 600px;
  }

  #entity-id {
    font-size: 10px;
    opacity: 0.3;
    letter-spacing: 2px;
    text-align: right;
  }

  /* Idle state */
  #idle-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--bg);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  #idle-screen.visible {
    display: flex;
  }

  #idle-title {
    font-family: 'VT323', monospace;
    font-size: 48px;
    letter-spacing: 12px;
    opacity: 0.2;
  }

  #idle-sub {
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0.15;
  }

  .blink {
    animation: blink 1.4s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Connection error */
  #conn-error {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--red);
    opacity: 0.7;
    z-index: 200;
  }

  #conn-error.visible { display: block; }
</style>
</head>
<body>

<div id="art-bg"></div>

<div id="idle-screen">
  <div id="idle-title">STANDBY</div>
  <div id="idle-sub">AWAITING AUDIO STREAM<span class="blink">_</span></div>
</div>

<div id="conn-error">⚠ WS DISCONNECTED — RECONNECTING...</div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">SONOS // MONITOR</div>
    <div class="sys-info">
      <span>SYS:ONLINE</span>
      <span id="clock">00:00:00</span>
      <span id="ws-status">WS:CONNECTING</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="art-wrapper">
      <img id="album-art" src="" alt="album art">
      <div id="art-label">ALBUM ART // STREAM</div>
    </div>

    <div id="track-info">
      <div>
        <div id="track-title">—</div>
        <div id="track-artist">—</div>
        <div id="track-album" style="margin-top:6px; font-size:13px; opacity:0.4; letter-spacing:2px;">—</div>
      </div>

      <div id="progress-section">
        <div class="info-label">POSITION</div>
        <div id="progress-bar-wrap">
          <div id="progress-bar" style="width:0%"></div>
        </div>
        <div id="progress-times">
          <span id="pos-current">0:00</span>
          <span id="pos-duration">0:00</span>
        </div>
      </div>

      <div id="status-row">
        <div id="state-indicator">
          <div id="state-dot"></div>
          <span id="state-text">IDLE</span>
        </div>
        <div class="status-pill" id="pill-shuffle">SHUFFLE</div>
        <div class="status-pill" id="pill-repeat">REPEAT</div>
      </div>

      <div id="visualizer"></div>

      <div class="info-block" style="margin-top:4px;">
        <div class="info-label">SOURCE</div>
        <div class="info-value" id="media-source" style="font-size:12px; opacity:0.5;">—</div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <div id="data-stream">INIT...</div>
    <div id="entity-id">ENTITY: —</div>
  </div>
</div>

<script src="config.js"></script>
<script>
if (typeof HA_HOST === 'undefined') {
  document.body.innerHTML = '<pre style="color:#ff2244;padding:40px;">ERROR: config.js not found.\nCopy config.example.js to config.js and fill in your values.</pre>';
  throw new Error('config.js not loaded');
}

const params = new URLSearchParams(window.location.search);
const SONOS_ENTITY = params.get('entity') || DEFAULT_ENTITY;

let ws = null;
let reconnectTimer = null;
let progressInterval = null;
let currentPos = 0;
let currentDuration = 0;
let isPlaying = false;

// Build visualizer bars
const viz = document.getElementById('visualizer');
const BAR_COUNT = 32;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const maxH = Math.floor(Math.random() * 34) + 6;
  b.style.setProperty('--max-h', maxH + 'px');
  b.style.animationDuration = (Math.random() * 0.5 + 0.2) + 's';
  b.style.animationDelay = (Math.random() * 0.3) + 's';
  viz.appendChild(b);
}

function setVisualizerPlaying(playing) {
  viz.querySelectorAll('.bar').forEach(b => {
    b.style.animationPlayState = playing ? 'running' : 'paused';
  });
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

// Format seconds
function fmt(s) {
  s = Math.floor(s || 0);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// Data stream ticker
const streamMsgs = [
  'ESTABLISHING UPNP HANDSHAKE...',
  'AUDIO BUFFER: NOMINAL',
  'METADATA SYNC: OK',
  'STREAM INTEGRITY: 100%',
  'CODEC: AAC/320KBPS',
  'LATENCY: <12MS',
];
let streamIdx = 0;
setInterval(() => {
  document.getElementById('data-stream').textContent = streamMsgs[streamIdx % streamMsgs.length];
  streamIdx++;
}, 3000);

function updateUI(state, attrs) {
  const title = attrs.media_title || '—';
  const artist = attrs.media_artist || '—';
  const album = attrs.media_album_name || '—';
  const artUrl = attrs.entity_picture
    ? `http://${HA_HOST}${attrs.entity_picture}`
    : '';
  const duration = attrs.media_duration || 0;
  const position = attrs.media_position || 0;
  const shuffle = attrs.shuffle;
  const repeat = attrs.repeat;
  const source = attrs.media_content_id || attrs.source || '—';

  isPlaying = state === 'playing';

  document.getElementById('track-title').textContent = title;
  document.getElementById('track-artist').textContent = artist;
  document.getElementById('track-album').textContent = album;
  document.getElementById('state-text').textContent = state.toUpperCase();
  document.getElementById('entity-id').textContent = `ENTITY: ${SONOS_ENTITY.toUpperCase()}`;
  document.getElementById('media-source').textContent = source.length > 60 ? source.slice(0,60)+'…' : source;

  // Album art
  if (artUrl) {
    document.getElementById('album-art').src = artUrl;
    document.getElementById('art-bg').style.backgroundImage = `url('${artUrl}')`;
  }

  // Progress
  currentDuration = duration;
  currentPos = position;
  updateProgress();

  // Shuffle / repeat pills
  document.getElementById('pill-shuffle').classList.toggle('active', !!shuffle);
  document.getElementById('pill-repeat').classList.toggle('active', repeat && repeat !== 'off');

  // Visualizer
  setVisualizerPlaying(isPlaying);

  // Idle screen
  const idle = !['playing','paused','buffering'].includes(state);
  document.getElementById('idle-screen').classList.toggle('visible', idle);

  // State dot color
  const dot = document.getElementById('state-dot');
  dot.style.background = isPlaying ? 'var(--green)' : '#ffaa00';
  dot.style.boxShadow = isPlaying ? '0 0 8px var(--green)' : '0 0 8px #ffaa00';
}

function updateProgress() {
  if (currentDuration <= 0) return;
  const pct = Math.min((currentPos / currentDuration) * 100, 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('pos-current').textContent = fmt(currentPos);
  document.getElementById('pos-duration').textContent = fmt(currentDuration);
}

// Increment position locally while playing
function startProgressTick() {
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) {
      currentPos += 1;
      updateProgress();
    }
  }, 1000);
}

// WebSocket connection
function connect() {
  if (ws) ws.close();
  ws = new WebSocket(`ws://${HA_HOST}/api/websocket`);
  let msgId = 1;
  let authenticated = false;

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'WS:AUTH';
    document.getElementById('conn-error').classList.remove('visible');
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'auth_required') {
      ws.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN }));
    }

    else if (msg.type === 'auth_ok') {
      authenticated = true;
      document.getElementById('ws-status').textContent = 'WS:LIVE';

      // Subscribe to state changes
      ws.send(JSON.stringify({
        id: msgId++,
        type: 'subscribe_events',
        event_type: 'state_changed'
      }));

      // Fetch current state immediately
      ws.send(JSON.stringify({
        id: msgId++,
        type: 'get_states'
      }));

      startProgressTick();
    }

    else if (msg.type === 'auth_invalid') {
      document.getElementById('ws-status').textContent = 'WS:AUTH_FAIL';
    }

    else if (msg.type === 'result' && msg.result) {
      // get_states response
      if (Array.isArray(msg.result)) {
        const entity = msg.result.find(e => e.entity_id === SONOS_ENTITY);
        if (entity) updateUI(entity.state, entity.attributes);
      }
    }

    else if (msg.type === 'event') {
      const data = msg.event?.data;
      if (data?.entity_id === SONOS_ENTITY && data.new_state) {
        const ns = data.new_state;
        currentPos = ns.attributes.media_position || currentPos;
        updateUI(ns.state, ns.attributes);
      }
    }
  };

  ws.onclose = () => {
    document.getElementById('ws-status').textContent = 'WS:DOWN';
    document.getElementById('conn-error').classList.add('visible');
    clearInterval(progressInterval);
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

connect();
</script>
</body>
</html>

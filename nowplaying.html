<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NOW PLAYING</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  #state-indicator, #btn-prev, #btn-next {
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  #state-indicator:hover, #state-indicator:focus,
  #btn-prev:hover, #btn-prev:focus,
  #btn-next:hover, #btn-next:focus {
    opacity: 1 !important;
    outline: none;
  }
  #theme-selector {
    cursor: pointer;
    opacity: 0.35;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid currentColor;
    border-radius: 3px;
    transition: opacity 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  #theme-selector:hover, #theme-selector:focus {
    opacity: 0.8;
    outline: none;
  }
</style>
<script>
  // Synchronous model loader — runs before rendering to prevent FOUC
  (function() {
    var params = new URLSearchParams(window.location.search);
    var model = params.get('theme') || 'te';
    model = model.replace(/[^a-z0-9-]/g, '');
    document.documentElement.setAttribute('data-model', model);
    document.write('<link rel="stylesheet" href="models/' + model + '.css?v=__VERSION__">');
  })();
</script>
</head>
<body>

<div id="art-bg"></div>
<div id="lyrics-overlay"><div id="lyrics-content"></div></div>

<div id="idle-screen">
  <div id="idle-title">STANDBY</div>
  <div id="idle-sub">AWAITING AUDIO STREAM<span class="blink">_</span></div>
</div>

<div id="conn-error">WS DISCONNECTED — RECONNECTING...</div>
<div id="lyrics-debug" style="position:fixed;bottom:4px;left:4px;font-size:14px;color:red;z-index:9999;background:black;padding:4px 8px;">DEBUG: HTML LOADED</div>
<div id="debug-info" style="position:fixed;top:40px;left:60px;font-size:11px;opacity:0.4;letter-spacing:2px;z-index:200;"></div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">MUSIC ASSISTANT // MONITOR v__VERSION__ sha:__SHA__</div>
    <div class="sys-info">
      <span id="theme-selector" tabindex="0" role="button"></span>
      <span id="clock">00:00:00</span>
      <span id="ws-status">WS:CONNECTING</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="art-wrapper">
      <img id="album-art" src="" alt="album art">
      <div id="art-label">ALBUM ART // STREAM</div>
    </div>

    <div id="track-info">
      <div>
        <div id="track-title">—</div>
        <div id="track-artist">—</div>
        <div id="track-album">—</div>
      </div>

      <div id="progress-section">
        <div class="info-label">POSITION</div>
        <div id="progress-bar-wrap">
          <div id="progress-bar" style="width:0%"></div>
        </div>
        <div id="progress-times">
          <span id="pos-current">0:00</span>
          <span id="pos-duration">0:00</span>
        </div>
      </div>

      <div id="status-row">
        <div id="btn-prev" class="status-pill" tabindex="0" role="button">PREV</div>
        <div id="state-indicator" tabindex="0" role="button">
          <div id="state-dot"></div>
          <span id="state-text">IDLE</span>
        </div>
        <div id="btn-next" class="status-pill" tabindex="0" role="button">NEXT</div>
        <div class="status-pill" id="pill-shuffle">SHUFFLE</div>
        <div class="status-pill" id="pill-repeat">REPEAT</div>
      </div>

      <div id="visualizer"></div>

      <div class="info-block">
        <div class="info-label">SOURCE</div>
        <div class="info-value" id="media-source">—</div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <div id="data-stream">INIT...</div>
    <div id="entity-id">PLAYER: —</div>
  </div>
</div>

<script src="config.js?v=__VERSION__"></script>
<script>document.getElementById('lyrics-debug').textContent = 'DEBUG: config loaded, MA_TOKEN=' + (typeof MA_TOKEN !== 'undefined' ? 'yes' : 'no');</script>
<script src="core.js?v=__VERSION__" onerror="document.getElementById('lyrics-debug').textContent='DEBUG: core.js FAILED TO LOAD'"></script>
<script>document.getElementById('lyrics-debug').textContent += ' | core.js parsed';</script>
<script>
  // Load model-specific JS
  (function() {
    var model = document.documentElement.getAttribute('data-model');
    var s = document.createElement('script');
    s.src = 'models/' + model + '.js?v=__VERSION__';
    document.body.appendChild(s);
  })();

  // Theme selector — cycles through available themes on click/keypress
  (function() {
    var themes = ['te', 'crt'];
    var current = document.documentElement.getAttribute('data-model');
    var btn = document.getElementById('theme-selector');
    btn.textContent = 'THEME: ' + current.toUpperCase();

    function switchTheme() {
      var idx = themes.indexOf(current);
      var next = themes[(idx + 1) % themes.length];
      var params = new URLSearchParams(window.location.search);
      params.set('theme', next);
      window.location.search = params.toString();
    }

    btn.addEventListener('click', switchTheme);
    btn.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); switchTheme(); }
    });
  })();
</script>
</body>
</html>

name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies and run tests
        run: npm ci && npm test

      - name: Check version was bumped
        run: |
          PR_VERSION=$(node -p "require('./package.json').version")
          MAIN_VERSION=$(git show origin/main:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          echo "PR version: $PR_VERSION"
          echo "Main version: ${MAIN_VERSION:-<not found>}"
          if [ -z "$MAIN_VERSION" ]; then
            echo "No package.json on main yet — first version, passing."
            exit 0
          fi
          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version not bumped. Run 'npm version patch|minor|major' before merging."
            exit 1
          fi
          echo "Version bumped: $MAIN_VERSION -> $PR_VERSION"

name: Deploy to Home Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Stamp version and SHA
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          sed -i "s/__VERSION__/$VERSION/g" nowplaying.html
          sed -i "s/__SHA__/$SHA/g" nowplaying.html

      - name: Deploy to HA Green
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HA_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.HA_SSH_PORT }} root@${{ secrets.HA_SSH_HOST }} "mkdir -p /config/www/models"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P ${{ secrets.HA_SSH_PORT }} nowplaying.html core.js package.json root@${{ secrets.HA_SSH_HOST }}:/config/www/
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P ${{ secrets.HA_SSH_PORT }} models/*.css models/*.js root@${{ secrets.HA_SSH_HOST }}:/config/www/models/
